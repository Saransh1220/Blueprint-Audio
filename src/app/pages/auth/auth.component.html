<div class="auth-page">
  <section class="auth-form-column animate-element animate-delay-100">
    <div class="auth-shell">
      <div class="auth-topbar">
        <div class="auth-brand">
          <div class="auth-brand-mark">RW</div>
          <div>
            <p>Red Wave</p>
            <span>Sound marketplace</span>
          </div>
        </div>

        <div class="view-switch">
          <button
            type="button"
            class="switch-chip"
            [class.active]="isLoginView"
            (click)="toggleView(true)"
          >
            Sign In
          </button>
          <button
            type="button"
            class="switch-chip"
            [class.active]="!isLoginView"
            (click)="toggleView(false)"
          >
            Sign Up
          </button>
        </div>
      </div>

      <div class="auth-copy">
        <h1>{{ pageTitle }}</h1>
        <p>{{ pageDescription }}</p>
      </div>

      <div class="custom-google-btn animate-element animate-delay-200">
        <div class="btn-content">
          <svg viewBox="0 0 48 48" aria-hidden="true">
            <path
              fill="#FFC107"
              d="M43.611 20.083H42V20H24v8h11.303c-1.649 4.657-6.08 8-11.303 8-6.627 0-12-5.373-12-12s12-5.373 12-12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 12.955 4 4 12.955 4 24s8.955 20 20 20 20-8.955 20-20c0-2.641-.21-5.236-.611-7.743z"
            />
            <path
              fill="#FF3D00"
              d="M6.306 14.691l6.571 4.819C14.655 15.108 18.961 12 24 12c3.059 0 5.842 1.154 7.961 3.039l5.657-5.657C34.046 6.053 29.268 4 24 4 16.318 4 9.656 8.337 6.306 14.691z"
            />
            <path
              fill="#4CAF50"
              d="M24 44c5.166 0 9.86-1.977 13.409-5.192l-6.19-5.238C29.211 35.091 26.715 36 24 36c-5.202 0-9.619-3.317-11.283-7.946l-6.522 5.025C9.505 39.556 16.227 44 24 44z"
            />
            <path
              fill="#1976D2"
              d="M43.611 20.083H42V20H24v8h11.303c-.792 2.237-2.231 4.166-4.087 5.571l6.19 5.238C42.022 35.026 44 30.038 44 24c0-2.641-.21-5.236-.611-7.743z"
            />
          </svg>
          <span>Continue with Google</span>
        </div>
        <div class="google-invisible-wrapper">
          <asl-google-signin-button type="standard" size="large" [width]="400" />
        </div>
      </div>

      <div class="divider animate-element animate-delay-300">
        <span>Or continue with email</span>
      </div>

      @if (isLoginView) {
        <form class="auth-form" (ngSubmit)="onLoginSubmit()">
          <div class="field animate-element animate-delay-400">
            <label for="loginEmail">Email Address</label>
            <div class="input-shell">
              <input
                id="loginEmail"
                type="email"
                name="email"
                [(ngModel)]="loginEmail"
                placeholder="Enter your email address"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="field animate-element animate-delay-500">
            <label for="loginPassword">Password</label>
            <div class="input-shell">
              <div class="password-shell">
                <input
                  id="loginPassword"
                  [type]="showPassword ? 'text' : 'password'"
                  name="password"
                  [(ngModel)]="loginPassword"
                  placeholder="Enter your password"
                  autocomplete="current-password"
                  required
                />
                <button type="button" class="icon-button" (click)="togglePasswordVisibility()">
                  @if (showPassword) {
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Zm10 4a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
                      />
                      <path d="M4 4 20 20" />
                    </svg>
                  } @else {
                    <svg viewBox="0 0 24 24" aria-hidden="true">
                      <path
                        d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Zm10 4a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
                      />
                    </svg>
                  }
                </button>
              </div>
            </div>
          </div>

          <div class="auth-row animate-element animate-delay-600">
            <label class="remember-me">
              <input type="checkbox" name="rememberMe" />
              <span>Keep me signed in</span>
            </label>

            <button type="button" class="text-action" (click)="goToForgotPassword()">
              Reset password
            </button>
          </div>

          <button class="primary-btn animate-element animate-delay-700" type="submit" [disabled]="isLoading()">
            @if (isLoading()) {
              <app-loading-spinner size="18px" color="var(--bg-color)" />
            } @else {
              {{ submitLabel }}
            }
          </button>
        </form>
      } @else {
        <form class="auth-form" (ngSubmit)="onRegisterSubmit()">
          <div class="grid-two">
            <div class="field animate-element animate-delay-400">
              <label for="registerUsername">Username</label>
              <div class="input-shell">
                <input
                  id="registerUsername"
                  type="text"
                  name="username"
                  [(ngModel)]="registerUsername"
                  placeholder="artist_01"
                  autocomplete="username"
                  required
                />
              </div>
            </div>

            <div class="field animate-element animate-delay-450">
              <label for="registerDisplayName">Display Name</label>
              <div class="input-shell">
                <input
                  id="registerDisplayName"
                  type="text"
                  name="displayName"
                  [(ngModel)]="registerDisplayName"
                  placeholder="Stage name"
                  autocomplete="name"
                  required
                />
              </div>
            </div>
          </div>

          <div class="field animate-element animate-delay-500">
            <label for="registerEmail">Email Address</label>
            <div class="input-shell">
              <input
                id="registerEmail"
                type="email"
                name="email"
                [(ngModel)]="registerEmail"
                placeholder="name@company.com"
                autocomplete="email"
                required
              />
            </div>
          </div>

          <div class="grid-two">
            <div class="field animate-element animate-delay-550">
              <label for="registerPassword">Password</label>
              <div class="input-shell">
                <div class="password-shell">
                  <input
                    id="registerPassword"
                    [type]="showPassword ? 'text' : 'password'"
                    name="password"
                    [(ngModel)]="registerPassword"
                    placeholder="Min. 8 characters"
                    autocomplete="new-password"
                    required
                  />
                  <button type="button" class="icon-button" (click)="togglePasswordVisibility()">
                    @if (showPassword) {
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path
                          d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Zm10 4a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
                        />
                        <path d="M4 4 20 20" />
                      </svg>
                    } @else {
                      <svg viewBox="0 0 24 24" aria-hidden="true">
                        <path
                          d="M2 12s3.5-7 10-7 10 7 10 7-3.5 7-10 7-10-7-10-7Zm10 4a4 4 0 1 0 0-8 4 4 0 0 0 0 8Z"
                        />
                      </svg>
                    }
                  </button>
                </div>
              </div>
            </div>

            <div class="field animate-element animate-delay-600">
              <label for="registerConfirmPassword">Confirm Password</label>
              <div class="input-shell">
                <input
                  id="registerConfirmPassword"
                  type="password"
                  name="confirmPassword"
                  [(ngModel)]="registerConfirmPassword"
                  placeholder="Repeat password"
                  autocomplete="new-password"
                  required
                />
              </div>
            </div>
          </div>

          <div class="field animate-element animate-delay-650">
            <label>I am joining as</label>
            <div class="role-switch">
              <input
                id="roleArtist"
                type="radio"
                name="role"
                value="artist"
                [(ngModel)]="registerRole"
                hidden
              />
              <label for="roleArtist">Artist</label>

              <input
                id="roleProducer"
                type="radio"
                name="role"
                value="producer"
                [(ngModel)]="registerRole"
                hidden
              />
              <label for="roleProducer">Producer</label>
              <div class="role-highlight"></div>
            </div>
          </div>

          <button class="primary-btn animate-element animate-delay-700" type="submit" [disabled]="isLoading()">
            @if (isLoading()) {
              <app-loading-spinner size="18px" color="var(--bg-color)" />
            } @else {
              {{ submitLabel }}
            }
          </button>
        </form>
      }

    </div>
  </section>

  <section class="auth-visual-column animate-slide-right animate-delay-300">
    <div class="auth-visual" [style.backgroundImage]="'url(' + heroImageSrc + ')'"></div>
  </section>
</div>
