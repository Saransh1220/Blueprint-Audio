<!-- LOADING BAR -->
<app-loading-bar></app-loading-bar>

<!-- BACKGROUND GRID -->
<div class="bg-overlay">
  <div class="orb-layer"></div>
</div>

<!-- PRELOADER -->
<div class="loader">
  <div class="logo-container">
    <!-- Loader is always on dark bg, use white/dark logo -->
    <img class="loader-logo" src="/logo-dark-cropped.png" alt="Waveyard" />
  </div>
  <div class="loading-text">WAVEYARD<span class="dots">...</span></div>
</div>

<style>
  .loader {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: #050505;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    z-index: 9999;
    transition:
      opacity 0.5s ease-out,
      visibility 0.5s;
  }

  .logo-container {
    width: 80px;
    height: 80px;
    margin-bottom: 20px;
    position: relative;
  }

  .loader-logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    filter: drop-shadow(0 0 14px rgba(var(--brand-color-rgb), 0.45));
    animation: logoPulse 1.8s ease-in-out infinite alternate;
  }

  .loading-text {
    font-family: 'Space Mono', monospace;
    color: var(--text-color);
    font-size: 0.9rem;
    letter-spacing: 4px;
    opacity: 0.8;
  }

  .dots {
    animation: blink 1.5s infinite;
  }

  @keyframes logoPulse {
    0% {
      opacity: 0.72;
      transform: scale(0.96);
    }

    100% {
      opacity: 1;
      transform: scale(1);
    }
  }

  @keyframes blink {
    0%,
    100% {
      opacity: 0;
    }

    50% {
      opacity: 1;
    }
  }
</style>

@if (!isUploadRoute()) {
  <app-header (cartClick)="toggleCart()"></app-header>
}
<app-cart></app-cart>
<div
  class="app-shell"
  [class.player-docked]="shouldReservePlayerSpace()"
  [class.player-expanded]="shouldReserveExpandedPlayerSpace()"
>
  <div class="app-route-layer">
    <router-outlet></router-outlet>
  </div>
  @if (!isStudioRoute() && !isAuthRoute() && !isUploadRoute() && !isExploreRoute()) {
    <app-footer></app-footer>
  }
</div>
<app-player></app-player>
@if (!isAuthRoute() && !isUploadRoute()) {
  <nav class="mobile-bottom-nav" aria-label="Mobile navigation">
    <a routerLink="/" routerLinkActive="active" [routerLinkActiveOptions]="{ exact: true }">
      <i class="fas fa-home"></i>
      <span>Home</span>
    </a>
    <a routerLink="/explore" routerLinkActive="active">
      <i class="fas fa-search"></i>
      <span>Explore</span>
    </a>
    <a routerLink="/studio/purchases" routerLinkActive="active">
      <i class="fas fa-book-open"></i>
      <span>Library</span>
    </a>
    <button type="button" (click)="toggleCart()">
      <i class="fas fa-cart-shopping"></i>
      <span>Cart</span>
    </button>
    <a routerLink="/settings" routerLinkActive="active">
      <i class="fas fa-bars"></i>
      <span>Menu</span>
    </a>
  </nav>
}
<app-modal></app-modal>
<app-toast></app-toast>
