<div class="theme-selector-wrap">
  <button class="current-theme-btn" (click)="toggleMode()">
    <span class="theme-name">{{
      themeService.currentMode() === 'dark' ? 'Dark Mode' : 'Light Mode'
    }}</span>
    <i
      class="fas"
      [class.fa-moon]="themeService.currentMode() === 'dark'"
      [class.fa-sun]="themeService.currentMode() === 'light'"
    ></i>
  </button>
</div>
