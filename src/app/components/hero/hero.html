<section class="hero" (mousemove)="onMouseMove($event)">
  <!-- Elegant minimal background -->
  <div class="hero-bg" aria-hidden="true">
    <div class="ambient-glow"></div>
  </div>

  <canvas class="hero-canvas" #heroCanvas></canvas>

  <div class="hero-inner">
    <!-- Left: Content -->
    <div class="hero-content">
      <div class="hero-collection-label gs-reveal">
        <span class="dot"></span>
        <span class="label-text">The Signature Collection</span>
      </div>

      <h1 class="hero-title gs-reveal">
        Sonic<br />
        <span class="title-accent">Architecture.</span>
      </h1>

      <p class="hero-desc gs-reveal">
        Exclusive instrumentals, loops, and custom sound design. Meticulously crafted, cleared, and
        ready for your next project.
      </p>

      <div class="hero-actions gs-reveal">
        <a routerLink="/search" class="btn btn-solid">
          <span>Explore the Vault</span>
        </a>
        <a routerLink="/upload" class="btn btn-outline">
          <span>License a Track</span>
        </a>
      </div>

      <div class="hero-credits gs-reveal">
        <div class="credit-item">
          <span class="credit-num">01</span>
          <span class="credit-label">Original Compositions</span>
        </div>
        <div class="credit-item">
          <span class="credit-num">02</span>
          <span class="credit-label">Royalty Free Masters</span>
        </div>
      </div>
    </div>

    <!-- Right: 3D Scene Container -->
    <div class="hero-visual" aria-hidden="true"></div>
  </div>
</section>
