<section class="genres-section block">
  <div class="section-head">
    <div>
      <div class="section-num"><span class="dot"></span> 01 &#183; Genres</div>
      <h2 class="section-h">pick a <em>flavor</em>, any flavor.</h2>
    </div>
    <div class="head-meta">
      <p>Six living collections. Each one curated by a resident producer, refreshed weekly.</p>
      <a class="arrow-link" href="#" (click)="$event.preventDefault()"
        >See all genres
        <svg
          width="12"
          height="12"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <line x1="5" y1="12" x2="19" y2="12" />
          <polyline points="12 5 19 12 12 19" />
        </svg>
      </a>
    </div>
  </div>

  <div class="category-grid">
    <div class="cat-tile">
      <div class="cat-num">01</div>
      <div>
        <h3>Trap &amp; <em>Drill</em></h3>
        <p class="cat-count">214 beats</p>
      </div>
    </div>
    <div class="cat-tile">
      <div class="cat-num">02</div>
      <div>
        <h3>R&amp;B <em>Soul</em></h3>
        <p class="cat-count">168 beats</p>
      </div>
    </div>
    <div class="cat-tile">
      <div class="cat-num">03</div>
      <div>
        <h3>Synth <em>Wave</em></h3>
        <p class="cat-count">91 beats</p>
      </div>
    </div>
    <div class="cat-tile">
      <div class="cat-num">04</div>
      <div>
        <h3>Boom <em>Bap</em></h3>
        <p class="cat-count">132 beats</p>
      </div>
    </div>
    <div class="cat-tile">
      <div class="cat-num">05</div>
      <div>
        <h3>Lo-<em>Fi</em></h3>
        <p class="cat-count">77 beats</p>
      </div>
    </div>
    <div class="cat-tile">
      <div class="cat-num">06</div>
      <div>
        <h3>Afro <em>beat</em></h3>
        <p class="cat-count">189 beats</p>
      </div>
    </div>
  </div>
</section>
