<div class="modal-overlay" [class.open]="modalService.isOpen()" (click)="close()">
  <div
    class="modal-container"
    (click)="$event.stopPropagation()"
    [style.width]="modalService.state()?.width"
    [style.height]="modalService.state()?.height"
  >
    <div class="modal-header">
      <h3>{{ modalService.state()?.title }}</h3>
      <button class="btn-close" (click)="close()" aria-label="Close">
        <svg
          width="14"
          height="14"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2.5"
        >
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>
    <div class="modal-content">
      <ng-container
        *ngComponentOutlet="modalService.state()?.component ?? null; inputs: modalInputs"
      ></ng-container>
    </div>
  </div>
</div>
